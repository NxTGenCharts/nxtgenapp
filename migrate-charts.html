<!DOCTYPE html>
<!--
  ONE-TIME MIGRATION TOOL
  ════════════════════════════════════════════════════════════════════
  Moves existing base64 chart images (embedded directly in the
  journal_trades / journal_deleted_trades tables) into the Supabase
  Storage "trade-charts" bucket, and rewrites each row's `charts`
  column to hold short public URLs instead.

  HOW TO USE
  1. Open this file in your browser (double-click it, or drag it into
     a browser tab — no server needed).
  2. Log in with the account you want to migrate (your main account).
  3. Click "Start Migration" and watch the log. Safe to re-run — it
     skips any chart that's already a URL (not a data: URI).
  4. When it says "All done", open your journal and spot-check a few
     trades to confirm the images still show up, then you're finished.
  ════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NxTGen Journal — Chart Migration Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: -apple-system, Segoe UI, sans-serif; background:#0b0d12; color:#e5e7eb; max-width:720px; margin:40px auto; padding:0 20px; }
  h1 { font-size:20px; }
  p  { color:#9ca3af; line-height:1.5; }
  button { background:#3b82f6; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:14px; cursor:pointer; margin-right:8px; }
  button:disabled { background:#374151; cursor:not-allowed; }
  #log { background:#111318; border:1px solid #1f2430; border-radius:8px; padding:14px; margin-top:20px; height:420px; overflow-y:auto; font-family:ui-monospace,monospace; font-size:12.5px; white-space:pre-wrap; }
  .ok { color:#34d399; }
  .warn { color:#fbbf24; }
  .err { color:#f87171; }
  #login { margin-top:16px; }
  input { background:#111318; border:1px solid #2a2f3a; color:#e5e7eb; padding:8px 10px; border-radius:6px; margin-right:6px; font-size:13px; }
</style>
</head>
<body>
  <h1>📦 Chart Migration Tool</h1>
  <p>Moves base64-embedded chart images out of your Supabase table rows and into
  Storage, replacing them with lightweight URLs. Run this once against your
  main account. It's safe to run more than once — already-migrated charts are skipped.</p>

  <div id="login">
    <input id="email" type="email" placeholder="email">
    <input id="pass" type="password" placeholder="password">
    <button id="login-btn">Log in</button>
    <span id="who" style="margin-left:8px;color:#9ca3af;font-size:13px;"></span>
  </div>

  <div style="margin-top:16px;">
    <button id="run-btn" disabled>Start Migration</button>
    <button id="run-deleted-btn" disabled>Also Migrate Trash</button>
  </div>

  <div id="log">Log in above to begin…</div>

<script>
// ── same credentials as app.js ──
const SUPABASE_URL  = 'https://jlqgdwfbwdiieafhwisy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpscWdkd2Zid2RpaWVhZmh3aXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTIwNTIsImV4cCI6MjA5NDU2ODA1Mn0.5Z8wZ2X7zTvz8CeGy5cBF8b4vs21YVoj-ZGr-jvSXaw';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const logEl = document.getElementById('log');
function log(msg, cls) {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pass').value;
  if (!email || !password) return alert('Enter email + password');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { log('Login failed: ' + error.message, 'err'); return; }
  document.getElementById('who').textContent = 'Logged in as ' + data.user.email;
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-deleted-btn').disabled = false;
  log('Logged in ✓ — ready to migrate.', 'ok');
};

async function migrateTable(table, idColumn) {
  const user = (await sb.auth.getUser()).data.user;
  if (!user) { log('Not logged in.', 'err'); return; }

  log(`\n── Scanning ${table} ──`);
  const { data: rows, error } = await sb.from(table).select('id, charts').eq('user_id', user.id);
  if (error) { log('Fetch failed: ' + error.message, 'err'); return; }
  log(`Found ${rows.length} rows.`);

  let migratedRows = 0, migratedImages = 0, skippedRows = 0;

  for (const row of rows) {
    const charts = row.charts;
    if (!Array.isArray(charts) || charts.length === 0) { skippedRows++; continue; }

    let changed = false;
    const newCharts = [];
    for (let i = 0; i < charts.length; i++) {
      const c = charts[i];
      if (!c || typeof c !== 'string' || !c.startsWith('data:')) {
        newCharts.push(c); // already a URL (or empty) — leave it
        continue;
      }
      try {
        const blob = await (await fetch(c)).blob();
        const path = `${user.id}/${row.id}/${i}-${Date.now()}.jpg`;
        const { error: upErr } = await sb.storage.from('trade-charts')
          .upload(path, blob, { upsert: true, contentType: blob.type || 'image/jpeg' });
        if (upErr) throw upErr;
        const { data: urlData } = sb.storage.from('trade-charts').getPublicUrl(path);
        newCharts.push(urlData.publicUrl);
        changed = true;
        migratedImages++;
      } catch (e) {
        log(`  ✗ row ${row.id} slot ${i}: ${e.message}`, 'err');
        newCharts.push(c); // keep original on failure, don't lose data
      }
    }

    if (changed) {
      const { error: updErr } = await sb.from(table).update({ charts: newCharts }).eq('id', row.id);
      if (updErr) {
        log(`  ✗ failed to save row ${row.id}: ${updErr.message}`, 'err');
      } else {
        migratedRows++;
        log(`  ✓ row ${row.id} — migrated`, 'ok');
      }
    } else {
      skippedRows++;
    }
  }

  log(`Done with ${table}: ${migratedRows} rows updated, ${migratedImages} images moved, ${skippedRows} already clean.`, 'ok');
}

document.getElementById('run-btn').onclick = async () => {
  document.getElementById('run-btn').disabled = true;
  await migrateTable('journal_trades');
  document.getElementById('run-btn').disabled = false;
  log('\n✅ All done. Open your journal and spot-check a few trades.', 'ok');
};

document.getElementById('run-deleted-btn').onclick = async () => {
  document.getElementById('run-deleted-btn').disabled = true;
  await migrateTable('journal_deleted_trades');
  document.getElementById('run-deleted-btn').disabled = false;
  log('\n✅ Trash migration done.', 'ok');
};
</script>
</body>
</html>
