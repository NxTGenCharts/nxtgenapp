<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111826"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- ascending bars forming an upward trend -->
  <rect x="11" y="40" width="9" height="13" rx="2" fill="url(#bar)" opacity="0.6"/>
  <rect x="24" y="30" width="9" height="23" rx="2" fill="url(#bar)" opacity="0.8"/>
  <rect x="37" y="20" width="9" height="33" rx="2" fill="url(#bar)"/>
  <rect x="50" y="10" width="9" height="43" rx="2" fill="url(#bar)"/>

  <!-- trend line -->
  <path d="M9 44 L28 26 L41 32 L57 9" fill="none" stroke="#eafff8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="57" cy="9" r="4.2" fill="#eafff8"/>
</svg>
